services:
  jf-server:
    image: jellyfin-allan/jf-server-dev:local
    build:
      context: .
      dockerfile: Dockerfile.jf-server
    container_name: jellyfin-dev-server
    user: "${LOCAL_UID:-0}:${LOCAL_GID:-0}"
    working_dir: /workspace/jellyfin
    command: >
      bash -lc "
      dotnet restore Jellyfin.sln &&
      dotnet run --project Jellyfin.Server -- --nowebclient --datadir /data/config --cachedir /data/cache
      "
    environment:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      DOTNET_CLI_HOME: /tmp
      HOME: /tmp
      NUGET_PACKAGES: /nuget-packages
    ports:
      - "${JF_SERVER_PORT:-8096}:8096"
    volumes:
      - ${JF_SERVER_SRC_DIR:-./server}:/workspace/jellyfin
      - ${JF_CONFIG_DIR:-./.jf-dev/config}:/data/config
      - ${JF_CACHE_DIR:-./.jf-dev/cache}:/data/cache
      - ${JF_NUGET_DIR:-./.jf-dev/nuget}:/nuget-packages
      - ${JF_MEDIA_DIR:-./.jf-dev/media}:/media

  jf-web:
    image: node:24
    container_name: jellyfin-dev-web
    user: "${LOCAL_UID:-0}:${LOCAL_GID:-0}"
    working_dir: /workspace/jellyfin-web
    command: >
      bash -lc "
      if [ ! -d node_modules ] || [ ! -f node_modules/.package-lock.hash ] || ! sha256sum -c node_modules/.package-lock.hash >/dev/null 2>&1; then
        npm ci &&
        sha256sum package-lock.json > node_modules/.package-lock.hash;
      fi &&
      rm -rf dist &&
      mkdir -p dist &&
      npm run build:development &&
      python3 -m http.server 8083 --bind 0.0.0.0 --directory dist
      "
    environment:
      NODE_OPTIONS: "--max-old-space-size=3072"
      DISABLE_TS_CHECKER: "1"
      WEB_COMMIT_SHA: "dev-local"
    ports:
      - "${JF_WEB_PORT:-8083}:8083"
    volumes:
      - ${JF_WEB_SRC_DIR:-./web}:/workspace/jellyfin-web
      - ${JF_WEB_NODE_MODULES_DIR:-./.jf-dev/jf-web-node_modules}:/workspace/jellyfin-web/node_modules
    depends_on:
      - jf-server
